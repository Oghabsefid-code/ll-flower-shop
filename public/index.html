<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>L&L</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="banner">
    <img src="/images/header.jpg" alt="L&L Header">
  </div>

  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">L&L</div>
        <div class="subbrand" data-i18n="subbrand">للبيع بالتجزئة للزهور والورود والنباتات</div>
      </div>

      <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('fa')">فارسی</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <h1 data-i18n="heroTitle">متجر الزهور الإلكتروني</h1>
      <p data-i18n="heroText">أهلاً بكم في L&L. يمكنكم تصفح الزهور والنباتات وتسجيل الطلب بسهولة وسرعة.</p>

      <div class="nav-links">
        <a class="btn btn-main" href="/order.html" data-i18n="goOrder">الدخول إلى صفحة الطلب</a>
        <a class="btn btn-soft" href="/orders.html" data-i18n="goOrders">عرض الطلبات</a>
        <a class="btn btn-soft" href="/admin/menu.html" data-i18n="goAdmin">إدارة المنتجات</a>
      </div>
    </div>
  </div>

  <script>
    const T = {
      ar: {
        subbrand: "للبيع بالتجزئة للزهور والورود والنباتات",
        heroTitle: "متجر الزهور الإلكتروني",
        heroText: "أهلاً بكم في L&L. يمكنكم تصفح الزهور والنباتات وتسجيل الطلب بسهولة وسرعة.",
        goOrder: "الدخول إلى صفحة الطلب",
        goOrders: "عرض الطلبات",
        goAdmin: "إدارة المنتجات"
      },
      en: {
        subbrand: "Retail sale of flowers, roses and plants",
        heroTitle: "Online Flower Store",
        heroText: "Welcome to L&L. Browse flowers and plants and place your order easily.",
        goOrder: "Open Order Page",
        goOrders: "View Orders",
        goAdmin: "Manage Products"
      },
      fa: {
        subbrand: "فروش خرده‌فروشی گل‌ها، رزها و گیاهان",
        heroTitle: "فروشگاه آنلاین گل",
        heroText: "به L&L خوش آمدید. می‌توانید گل‌ها و گیاهان را ببینید و خیلی راحت سفارش ثبت کنید.",
        goOrder: "ورود به صفحه سفارش",
        goOrders: "مشاهده سفارش‌ها",
        goAdmin: "مدیریت محصولات"
      }
    };

    function setLang(lang) {
      localStorage.setItem("site_lang", lang);
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "en" ? "ltr" : "rtl";

      document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
      if (lang === "ar") document.querySelectorAll(".lang-btn")[0].classList.add("active");
      if (lang === "en") document.querySelectorAll(".lang-btn")[1].classList.add("active");
      if (lang === "fa") document.querySelectorAll(".lang-btn")[2].classList.add("active");

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.textContent = T[lang][key] || "";
      });
    }

    setLang(localStorage.getItem("site_lang") || "ar");
  </script>
</body>
</html>
