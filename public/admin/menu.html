<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>L&L - Admin</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="banner">
    <img src="/images/header.jpg" alt="L&L Header">
  </div>

  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">L&L</div>
        <div class="subbrand" data-i18n="subbrand">للبيع بالتجزئة للزهور والورود والنباتات</div>
      </div>

      <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('ar')">العربية</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
        <button class="lang-btn" onclick="setLang('fa')">فارسی</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <h1 data-i18n="title">إدارة المنتجات</h1>
      <p data-i18n="subtitle">أضف الزهور وعدّلها واحذفها من هنا.</p>
    </div>

    <div class="panel">
      <div class="form-grid">
        <div>
          <label id="labelName">اسم المنتج</label>
          <input id="name">
        </div>

        <div>
          <label id="labelPrice">السعر</label>
          <input id="price" type="number">
        </div>

        <div>
          <label id="labelImage">الصورة</label>
          <input id="imageFile" type="file" accept="image/*" onchange="previewImage()">
          <div class="preview-box" id="previewBox"></div>
          <div class="small-text" id="currentImageText"></div>
        </div>

        <div>
          <label id="labelCategory">التصنيف</label>
          <input id="category">
        </div>

        <div>
          <label id="labelStock">المخزون</label>
          <input id="stock" type="number">
        </div>
      </div>

      <div class="spacer"></div>
      <button class="btn btn-main" id="saveBtn" onclick="saveFlower()">حفظ المنتج</button>
      <button class="btn btn-soft" id="resetBtn" onclick="resetForm()">تنظيف</button>
    </div>

    <div class="spacer"></div>

    <div class="panel table-wrap">
      <table>
        <thead>
          <tr>
            <th data-i18n="th1">الرقم</th>
            <th data-i18n="th2">الاسم</th>
            <th data-i18n="th3">السعر</th>
            <th data-i18n="th4">التصنيف</th>
            <th data-i18n="th5">المخزون</th>
            <th data-i18n="th6">الصورة</th>
            <th data-i18n="th7">العمليات</th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>
  </div>

  <script>
    const T = {
      ar: {
        subbrand: "للبيع بالتجزئة للزهور والورود والنباتات",
        title: "إدارة المنتجات",
        subtitle: "أضف الزهور وعدّلها واحذفها من هنا.",
        name: "اسم المنتج",
        price: "السعر",
        image: "الصورة",
        category: "التصنيف",
        stock: "المخزون",
        save: "حفظ المنتج",
        reset: "تنظيف",
        th1: "الرقم",
        th2: "الاسم",
        th3: "السعر",
        th4: "التصنيف",
        th5: "المخزون",
        th6: "الصورة",
        th7: "العمليات",
        edit: "تعديل",
        del: "حذف",
        view: "عرض",
        noItems: "لا توجد منتجات",
        needName: "أدخل الاسم",
        needPrice: "أدخل السعر",
        deleteConfirm: "هل تريد حذف هذا المنتج؟",
        placeholderName: "مثلاً باقة ورد أبيض",
        placeholderPrice: "مثلاً 15",
        placeholderCategory: "مثلاً ورد، نباتات",
        placeholderStock: "مثلاً 10",
        currentImage: "الصورة الحالية:",
        chooseNewImage: "يمكنك اختيار صورة جديدة أو تركها كما هي"
      },
      en: {
        subbrand: "Retail sale of flowers, roses and plants",
        title: "Manage Products",
        subtitle: "Add, edit and delete flowers from here.",
        name: "Product Name",
        price: "Price",
        image: "Image",
        category: "Category",
        stock: "Stock",
        save: "Save Product",
        reset: "Reset",
        th1: "ID",
        th2: "Name",
        th3: "Price",
        th4: "Category",
        th5: "Stock",
        th6: "Image",
        th7: "Actions",
        edit: "Edit",
        del: "Delete",
        view: "View",
        noItems: "No products found",
        needName: "Enter product name",
        needPrice: "Enter price",
        deleteConfirm: "Delete this product?",
        placeholderName: "e.g. White Rose Box",
        placeholderPrice: "e.g. 15",
        placeholderCategory: "e.g. roses, plants",
        placeholderStock: "e.g. 10",
        currentImage: "Current image:",
        chooseNewImage: "You can choose a new image or keep the current one"
      },
      fa: {
        subbrand: "فروش خرده‌فروشی گل‌ها، رزها و گیاهان",
        title: "مدیریت محصولات",
        subtitle: "از اینجا گل‌ها را اضافه، ویرایش و حذف کن.",
        name: "نام محصول",
        price: "قیمت",
        image: "تصویر",
        category: "دسته‌بندی",
        stock: "موجودی",
        save: "ذخیره محصول",
        reset: "پاک کردن",
        th1: "شماره",
        th2: "نام",
        th3: "قیمت",
        th4: "دسته",
        th5: "موجودی",
        th6: "تصویر",
        th7: "عملیات",
        edit: "ویرایش",
        del: "حذف",
        view: "نمایش",
        noItems: "محصولی ثبت نشده",
        needName: "نام محصول را وارد کن",
        needPrice: "قیمت را وارد کن",
        deleteConfirm: "این محصول حذف شود؟",
        placeholderName: "مثلاً باکس رز سفید",
        placeholderPrice: "مثلاً 15",
        placeholderCategory: "مثلاً رز، گیاه",
        placeholderStock: "مثلاً 10",
        currentImage: "تصویر فعلی:",
        chooseNewImage: "می‌توانی تصویر جدید انتخاب کنی یا همین را نگه داری"
      }
    };

    let lang = localStorage.getItem("site_lang") || "ar";
    let editingId = null;
    let currentImageUrl = "";

    function text(key) {
      return T[lang][key] || key;
    }

    function setLang(newLang) {
      lang = newLang;
      localStorage.setItem("site_lang", lang);
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === "en" ? "ltr" : "rtl";

      document.querySelectorAll(".lang-btn").forEach(btn => btn.classList.remove("active"));
      if (lang === "ar") document.querySelectorAll(".lang-btn")[0].classList.add("active");
      if (lang === "en") document.querySelectorAll(".lang-btn")[1].classList.add("active");
      if (lang === "fa") document.querySelectorAll(".lang-btn")[2].classList.add("active");

      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        el.textContent = T[lang][key] || "";
      });

      document.getElementById("labelName").textContent = text("name");
      document.getElementById("labelPrice").textContent = text("price");
      document.getElementById("labelImage").textContent = text("image");
      document.getElementById("labelCategory").textContent = text("category");
      document.getElementById("labelStock").textContent = text("stock");
      document.getElementById("saveBtn").textContent = text("save");
      document.getElementById("resetBtn").textContent = text("reset");

      document.getElementById("name").placeholder = text("placeholderName");
      document.getElementById("price").placeholder = text("placeholderPrice");
      document.getElementById("category").placeholder = text("placeholderCategory");
      document.getElementById("stock").placeholder = text("placeholderStock");

      renderCurrentImageText();
      loadList();
    }

    function renderCurrentImageText() {
      const el = document.getElementById("currentImageText");
      if (currentImageUrl) {
        el.textContent = `${text("currentImage")} ${text("chooseNewImage")}`;
      } else {
        el.textContent = "";
      }
    }

    function previewImage() {
      const fileInput = document.getElementById("imageFile");
      const previewBox = document.getElementById("previewBox");
      previewBox.innerHTML = "";

      if (!fileInput.files.length) return;

      const file = fileInput.files[0];
      const img = document.createElement("img");
      img.src = URL.createObjectURL(file);
      previewBox.appendChild(img);
    }

    async function uploadImageIfNeeded() {
      const fileInput = document.getElementById("imageFile");
      if (!fileInput.files.length) return currentImageUrl;

      const fd = new FormData();
      fd.append("image", fileInput.files[0]);

      const res = await fetch("/api/menu/add", {
        method: "POST",
        body: fd
      });

      if (!res.ok) {
        throw new Error(await res.text());
      }

      const data = await res.json();
      return data.url;
    }

    async function loadList() {
      const res = await fetch("/api/menu/add");
      const items = await res.json();
      const list = document.getElementById("list");

      if (!items.length) {
        list.innerHTML = `<tr><td colspan="7">${text("noItems")}</td></tr>`;
        return;
      }

      list.innerHTML = items.map(item => `
        <tr>
          <td>${item.id}</td>
          <td>${item.name}</td>
          <td>KD ${Number(item.price).toLocaleString()}</td>
          <td>${item.category || "-"}</td>
          <td>${item.stock}</td>
          <td>${item.image ? `<a href="${item.image}" target="_blank">${text("view")}</a>` : "-"}</td>
          <td>
            <div class="action-row">
              <button class="btn btn-soft" onclick='editFlower(${JSON.stringify(item).replace(/'/g, "&apos;")})'>${text("edit")}</button>
              <button class="btn btn-danger" onclick='deleteFlower(${item.id})'>${text("del")}</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function editFlower(item) {
      editingId = item.id;
      currentImageUrl = item.image || "";
      document.getElementById("name").value = item.name || "";
      document.getElementById("price").value = item.price || "";
      document.getElementById("category").value = item.category || "";
      document.getElementById("stock").value = item.stock || "";
      document.getElementById("imageFile").value = "";
      document.getElementById("previewBox").innerHTML = currentImageUrl
        ? `<img src="${currentImageUrl}" alt="">`
        : "";
      renderCurrentImageText();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetForm() {
      editingId = null;
      currentImageUrl = "";
      document.getElementById("name").value = "";
      document.getElementById("price").value = "";
      document.getElementById("category").value = "";
      document.getElementById("stock").value = "";
      document.getElementById("imageFile").value = "";
      document.getElementById("previewBox").innerHTML = "";
      renderCurrentImageText();
    }

    async function saveFlower() {
      try {
        const imageUrl = await uploadImageIfNeeded();

        const data = {
          name: document.getElementById("name").value.trim(),
          price: Number(document.getElementById("price").value || 0),
          image: imageUrl,
          category: document.getElementById("category").value.trim(),
          stock: Number(document.getElementById("stock").value || 0)
        };

        if (!data.name) return alert(text("needName"));
        if (!data.price) return alert(text("needPrice"));

        let url = "/api/flowers";
        let method = "POST";

        if (editingId) {
          url = `/api/flowers/${editingId}`;
          method = "PUT";
        }

        const res = await fetch(url, {
          method,
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        if (!res.ok) {
          const txt = await res.text();
          return alert(txt);
        }

        resetForm();
        loadList();
      } catch (err) {
        alert(err.message);
      }
    }

    async function deleteFlower(id) {
      if (!confirm(text("deleteConfirm"))) return;

      const res = await fetch("/api/menu/add"/${id}`, {
        method: "DELETE"
      });

      if (res.ok) loadList();
    }

    setLang(lang);
  </script>
</body>
</html>
